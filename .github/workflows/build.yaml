name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: ${{ matrix.system }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          - os: macos-14
            system: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: moocs-collect-nix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Flake check
        run: nix flake check --no-build
      - name: Build collect-cli
        run: nix build --print-build-logs .#collect-cli
      - name: Build collect-tui
        run: nix build --print-build-logs .#collect-tui
      - name: Build mcmerge
        run: nix build --print-build-logs .#mcmerge
      - name: Build moocs-collect
        run: nix build --print-build-logs .#moocs-collect
